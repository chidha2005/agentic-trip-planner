spring:
  main:
    web-application-type: servlet
  application:
    name: agentic-trip-planner
  ai:
    google:
      genai:
        api-key: AIzaSyDAFmp3lxTczKQcNPMq-nLCWyhb49FGu44
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0
  datasource:
    url: jdbc:h2:mem:agentic_ai;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
resilience4j:
  retry:
    instances:
      geminiRetry:
        max-attempts: 3
        wait-duration: 2s
  circuitbreaker:
    instances:
      geminiCircuitBreaker:
        failure-rate-threshold: 50
        sliding-window-size: 10